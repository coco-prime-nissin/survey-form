<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ココプライム日進店 アンケート</title>

  <style>
    body { font-family: "Helvetica Neue", Arial, sans-serif; padding: 1em; background: #f9f9f9; }
    h1 { text-align: center; color: #009fe8; }
    .form-group { margin-bottom: 1.5em; }
    textarea, input[type="text"] { width: 100%; padding: 0.9em; border-radius: 10px; border: 2px solid #ccc; }
    .option-group { display: flex; flex-direction: column; gap: 0.6em; }
    .option-label { padding: 1em; border: 2px solid #ccc; border-radius: 30px; text-align: center; cursor: pointer; }
    input[type="radio"] { display: none; }
    input[type="radio"]:checked + .option-label { background: #009fe8; color: white; border-color: #009fe8; }
    button { width: 100%; padding: 1em; background: #009fe8; color: #fff; border: none; border-radius: 10px; }
  </style>
</head>

<body>

<h1>アンケート</h1>

<form id="surveyForm">

<!-- 満足度 -->
<div class="form-group">
<label>満足度</label>
<div class="option-group">
<input type="radio" name="satisfaction" value="満足" id="s1"><label for="s1" class="option-label">満足</label>
<input type="radio" name="satisfaction" value="やや満足" id="s2"><label for="s2" class="option-label">やや満足</label>
<input type="radio" name="satisfaction" value="やや不満" id="s3"><label for="s3" class="option-label">やや不満</label>
<input type="radio" name="satisfaction" value="不満" id="s4"><label for="s4" class="option-label">不満</label>
</div>
</div>

<!-- メニュー -->
<div class="form-group">
<label>ご利用メニュー</label>
<div class="option-group">
<input type="radio" name="menu" value="七五三" id="m1"><label for="m1" class="option-label">七五三</label>
<input type="radio" name="menu" value="成人式" id="m2"><label for="m2" class="option-label">成人式</label>
<input type="radio" name="menu" value="家族写真" id="m3"><label for="m3" class="option-label">家族写真</label>
<input type="radio" name="menu" value="その他" id="m4"><label for="m4" class="option-label">その他</label>
<input type="text" id="menu-other" style="display:none;" placeholder="その他内容">
</div>
</div>

<!-- きっかけ -->
<div class="form-group">
<label>当店を知ったきっかけ</label>
<div class="option-group">
<input type="radio" name="source" value="Google" id="c1"><label for="c1" class="option-label">Google</label>
<input type="radio" name="source" value="Instagram" id="c2"><label for="c2" class="option-label">Instagram</label>
<input type="radio" name="source" value="紹介" id="c3"><label for="c3" class="option-label">紹介</label>
</div>
</div>

<!-- 写真使用 -->
<div class="form-group">
<label>写真使用許可</label>
<div class="option-group">
<input type="radio" name="usage" value="OK" id="u1"><label for="u1" class="option-label">OK</label>
<input type="radio" name="usage" value="主役のみOK" id="u2"><label for="u2" class="option-label">主役のみOK</label>
<input type="radio" name="usage" value="NG" id="u3"><label for="u3" class="option-label">NG</label>
</div>
</div>

<!-- コメント -->
<div class="form-group">
<textarea id="comment" placeholder="こちらにどのような撮影メニューでご利用頂いたかご記入後、感想をご記入ください"></textarea>
</div>

<button type="submit">送信</button>

</form>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("al3AUw0oCMSbzXt0U");

// その他入力表示
document.querySelectorAll('input[name="menu"]').forEach(r=>{
  r.addEventListener("change", ()=>{
    document.getElementById("menu-other").style.display =
      r.value === "その他" && r.checked ? "block" : "none";
  });
});

document.getElementById("surveyForm").addEventListener("submit", function(e){
  e.preventDefault();

  const satisfaction = document.querySelector('input[name="satisfaction"]:checked')?.value || "";
  
  let menu = document.querySelector('input[name="menu"]:checked')?.value || "";
  if(menu === "その他"){
    menu = document.getElementById("menu-other").value || "その他";
  }

  const source = document.querySelector('input[name="source"]:checked')?.value || "";
  const usage = document.querySelector('input[name="usage"]:checked')?.value;
  const comment = document.getElementById("comment").value || "";

  // 未選択チェック
  if(!usage){
    alert("写真使用許可を選択してください");
    return;
  }

  // 保存
  localStorage.setItem("satisfaction", satisfaction);
  localStorage.setItem("menu", menu);
  localStorage.setItem("source", source);
  localStorage.setItem("usage", usage);
  localStorage.setItem("comment", comment);

  emailjs.send("service_4ypfuxh", "survey_template", {
    satisfaction,
    menu,
    source,
    usage,
    comment
  })
  .then(()=>{
    window.location.href = "thanks.html";
  })
  .catch((error)=>{
    console.log(error);
    alert("送信失敗：" + error.text);
  });

});
</script>

</body>
</html>
